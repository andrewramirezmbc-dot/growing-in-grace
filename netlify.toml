# Growing in Grace — Netlify Configuration
# Plain HTML site, no build step.

[build]
  publish = "."
  # No build command — static files served directly

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets (CSS, JS, images)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
