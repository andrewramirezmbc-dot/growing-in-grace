<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Growing in Grace — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #7ecbc3;
        color: #2b2b2b;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .coming-soon {
        max-width: 520px;
      }
      .coming-soon__title {
        font-family: Georgia, Cambria, "Times New Roman", serif;
        font-size: clamp(2rem, 5vw, 3rem);
        font-weight: 700;
        color: #0e5d5f;
        line-height: 1.1;
        margin-bottom: 1.5rem;
      }
      .coming-soon__title em {
        font-style: italic;
        font-weight: 400;
      }
      .coming-soon__verse {
        font-family: Georgia, Cambria, "Times New Roman", serif;
        font-style: italic;
        font-size: 1.05rem;
        color: #0e5d5f;
        line-height: 1.6;
        margin-bottom: 0.5rem;
      }
      .coming-soon__ref {
        font-size: 0.75rem;
        font-weight: 600;
        color: #0e5d5f;
        opacity: 0.5;
        letter-spacing: 0.05em;
        margin-bottom: 2rem;
      }
      .coming-soon__status {
        font-size: 0.85rem;
        font-weight: 600;
        color: #0e5d5f;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }
    </style>
  </head>
  <body>
    <!-- TEMPORARY: This page will be replaced in Step 8 with the full
       homepage matching gig-homepage-prototype.html. Do not build
       permanent structure on this file. -->
    <div class="coming-soon">
      <h1 class="coming-soon__title">Growing <em>in</em> Grace</h1>
      <p class="coming-soon__verse">
        "But grow in the grace and knowledge of our Lord and Savior Jesus
        Christ."
      </p>
      <p class="coming-soon__ref">&mdash; 2 Peter 3:18</p>
      <p class="coming-soon__status">Launching Soon</p>
    </div>
